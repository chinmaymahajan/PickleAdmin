<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — CourtControl</title>
  <meta name="description" content="The page you're looking for doesn't exist. Head back to CourtControl to manage your pickleball and tennis sessions." />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="/pickleball_app_logo.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Fira Sans', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      color: #1e293b;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 800;
      color: #16a34a;
      line-height: 1;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 12px;
    }
    p {
      color: #475569;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    a {
      display: inline-block;
      background: #16a34a;
      color: #fff;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      transition: background 0.2s;
    }
    a:hover { background: #15803d; }
    a:focus-visible {
      outline: 2px solid #16a34a;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="error-code">404</div>
    <h1>Page not found</h1>
    <p>Looks like this court doesn't exist. Let's get you back to managing your sessions.</p>
    <a href="/">Back to CourtControl</a>
  </main>
</body>
</html>
